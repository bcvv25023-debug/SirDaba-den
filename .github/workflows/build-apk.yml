- name: Extract project
  run: |
    unzip sirdaba-android-firebase-configured.zip
    ls -la

- name: Create google-services.json
  run: |
    echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > sirdaba-android/app/google-services.json

- name: Grant execute permission for gradlew
  run: chmod +x sirdaba-android/gradlew

- name: Build Debug APK
  run: cd sirdaba-android && ./gradlew assembleDebug

- name: Upload APK
  uses: actions/upload-artifact@v4
  with:
    name: sirdaba-debug-apk
    path: sirdaba-android/app/build/outputs/apk/debug/*.apk
