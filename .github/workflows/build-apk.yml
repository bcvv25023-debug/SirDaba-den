name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract project
        run: |
          unzip sirdaba-android-firebase-configured.zip
          ls -la

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > sirdaba-android/app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x sirdaba-android/gradlew

      - name: Build Debug APK
        run: cd sirdaba-android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sirdaba-debug-apk
          path: sirdaba-android/app/build/outputs/apk/debug/*.apk
